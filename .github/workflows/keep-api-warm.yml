name: Keep API warm

# Pings the Render free-tier API on a schedule so it does not sleep after idle.
# Render sleeps a free service after ~15 min of inactivity; the first request
# after that takes 50-90s to wake. This keeps it responsive for users.

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API health endpoint
        run: |
          curl -fsS --max-time 120 https://api.logictrade.site/api/health || true
