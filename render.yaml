# MarketMind Labs — Render Blueprint
# Blueprint ID: exs-d8l494mgvqtc73ahtbhg
# Dashboard: https://dashboard.render.com/blueprint/exs-d8l494mgvqtc73ahtbhg

services:
  # Backend API (FastAPI)
  - type: web
    name: marketmind-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: marketmind-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: https://www.logictrade.site
      - key: CORS_ORIGINS
        value: https://logictrade.site,https://www.logictrade.site,https://marketmind-frontend-s0zl.onrender.com
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: AD_CLIENT
        sync: false
      - key: AD_SLOT_PROBABILITY
        sync: false
      - key: AD_SLOT_SIDEBAR
        sync: false
      - key: AD_SLOT_FOOTER
        sync: false
      - key: AMAZON_AFFILIATE_TAG
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_PLAN_ID
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: SUBSCRIPTION_AMOUNT_INR
        value: "999"
      - key: TRIAL_DAYS
        value: "7"

  # Frontend (Next.js)
  - type: web
    name: marketmind-frontend
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    rootDir: frontend
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://api.logictrade.site
      - key: NODE_VERSION
        value: 20
      - key: NEXT_PUBLIC_AD_CLIENT
        sync: false
      - key: NEXT_PUBLIC_AD_SLOT_PROBABILITY
        sync: false
      - key: NEXT_PUBLIC_AD_SLOT_SIDEBAR
        sync: false
      - key: NEXT_PUBLIC_AD_SLOT_FOOTER
        sync: false
      - key: NEXT_PUBLIC_AMAZON_AFFILIATE_TAG
        sync: false
      - key: NEXT_PUBLIC_RAZORPAY_KEY_ID
        sync: false

databases:
  - name: marketmind-db
    plan: free
