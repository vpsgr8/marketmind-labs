# MarketMind Labs — Render Blueprint
# Blueprint ID: exs-d8l494mgvqtc73ahtbhg
# Dashboard: https://dashboard.render.com/blueprint/exs-d8l494mgvqtc73ahtbhg

services:
  # Backend API (FastAPI)
  - type: web
    name: marketmind-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: marketmind-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: https://www.logictrade.site
      - key: CORS_ORIGINS
        value: https://logictrade.site,https://www.logictrade.site,https://marketmind-frontend-s0zl.onrender.com
      - key: PYTHON_VERSION
        value: 3.11.8

  # Frontend (Next.js)
  - type: web
    name: marketmind-frontend
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    rootDir: frontend
    plan: free
    envVars:
      # TEMP: direct Render URL until api.logictrade.site SSL is verified; then switch back
      - key: NEXT_PUBLIC_API_URL
        value: https://marketmind-api-pdn0.onrender.com
      - key: NODE_VERSION
        value: 20

databases:
  - name: marketmind-db
    plan: free
